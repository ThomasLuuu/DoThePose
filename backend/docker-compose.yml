version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - UPLOAD_DIR=/app/uploads
      - PROCESSED_DIR=/app/processed
      - DATABASE_PATH=/app/data/guides.db
      - DEFAULT_LINE_OPACITY=0.4
      - DEFAULT_STROKE_WIDTH=2
      - MAX_FILE_SIZE_MB=10
    volumes:
      - uploads_data:/app/uploads
      - processed_data:/app/processed
      - db_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  uploads_data:
  processed_data:
  db_data:
